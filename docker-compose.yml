services:
  app:
    build: ./spring-boot-demo
    container_name: spring-demo
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=${APP_ENV}
      - APP_VERSION=${APP_VERSION}
    secrets:
      - db_password
    restart: unless-stopped
    networks:
      - demo-net

  nginx:
    build: ./nginx
    container_name: nginx-gateway
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - demo-net

secrets:
  db_password:
    file: ./secrets/db_password.txt

networks:
  demo-net:
    driver: bridge
