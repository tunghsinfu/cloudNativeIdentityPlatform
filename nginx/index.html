<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; text-align: center; }
        h1 { color: #333; }
        .status { margin-top: 30px; padding: 20px; background: #f0f8ff; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Microservices Demo</h1>
    <p>Welcome to the microservices demo!</p>
    <div class="status">
        <p>Nginx is running as API Gateway</p>
        <p>Backend: <span id="backend-status">checking...</span></p>
    </div>
    <script>
        fetch('/api/')
            .then(r => r.text())
            .then(t => document.getElementById('backend-status').textContent = t)
            .catch(() => document.getElementById('backend-status').textContent = 'unreachable');
    </script>
</body>
</html>
